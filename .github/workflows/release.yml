name: Build and Release Starter Kit

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  # version up したらここを更新する
  NYANQL_REF: v0.0.18
  NYAN8_REF: v0.0.15
  NYANPUI_REF: v0.0.12

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Starter Kit repository
        uses: actions/checkout@v4

      - name: Check out NyanQL at pinned ref
        uses: actions/checkout@v4
        with:
          repository: NyanQL/NyanQL
          ref: ${{ env.NYANQL_REF }}
          path: NyanQL_src
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out Nyan8 at pinned ref
        uses: actions/checkout@v4
        with:
          repository: NyanQL/Nyan8
          ref: ${{ env.NYAN8_REF }}
          path: Nyan8_src
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out NyanPUI at pinned ref
        uses: actions/checkout@v4
        with:
          repository: NyanQL/NyanPUI
          ref: ${{ env.NYANPUI_REF }}
          path: NyanPUI_src
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install zip on Windows
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: choco install zip -y

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Build and Package Starter Kit
        shell: bash
        env:
          CGO_ENABLED: 1
          GIN_MODE: release
          STARTER_KIT_VERSION: ${{ github.ref_name }}
        run: |
          starter_kit_version="${STARTER_KIT_VERSION:-dev}"
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ext=".exe"
          fi

          mkdir -p release_package
          cp README.md LICENSE.md init.sql release_package/
          cp -R NyanQL Nyan8 NyanPUI release_package/

          (cd NyanQL_src && go build -ldflags "-X main.buildVersion=${NYANQL_REF}" -o "../release_package/NyanQL/NyanQL${ext}" main.go)
          (cd Nyan8_src && go build -ldflags "-X main.BinaryVersion=${NYAN8_REF}" -o "../release_package/Nyan8/Nyan8${ext}" main.go)
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            (cd NyanPUI_src && go build -ldflags "-linkmode=external -X main.buildVersion=${NYANPUI_REF}" -o "../release_package/NyanPUI/NyanPUI${ext}" main.go)
          else
            (cd NyanPUI_src && go build -ldflags "-X main.buildVersion=${NYANPUI_REF}" -o "../release_package/NyanPUI/NyanPUI${ext}" main.go)
          fi

          zip_name="NyanKIT_${starter_kit_version}_${{ matrix.os }}.zip"
          zip -r "${zip_name}" release_package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-starter-package
          path: NyanKIT_${{ github.ref_name }}_${{ matrix.os }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-latest-starter-package
          path: artifacts/linux

      - name: Download macOS package
        uses: actions/download-artifact@v4
        with:
          name: macos-latest-starter-package
          path: artifacts/macos

      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: windows-latest-starter-package
          path: artifacts/windows

      - name: Create GitHub Release & Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Starter Kit Release ${{ github.ref_name }}
          files: |
            artifacts/linux/NyanKIT_${{ github.ref_name }}_ubuntu-latest.zip
            artifacts/macos/NyanKIT_${{ github.ref_name }}_macos-latest.zip
            artifacts/windows/NyanKIT_${{ github.ref_name }}_windows-latest.zip
          draft: false
          prerelease: false
